services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/dev.db
    volumes:
      - db-data:/app/data
      - chroma-data:/app/backend/chroma_db
      - charts-data:/app/backend/charts

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        BACKEND_URL: http://backend:8001
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8001
    depends_on:
      - backend

volumes:
  db-data:
  chroma-data:
  charts-data:
