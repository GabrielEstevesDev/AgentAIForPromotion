services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/dev.db
    volumes:
      - db-data:/app/data
      - chroma-data:/app/backend/chroma_db
      - charts-data:/app/backend/charts

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        BACKEND_URL: http://backend:8001
        NEXT_PUBLIC_BACKEND_URL: https://agenticstack.store
    environment:
      - BACKEND_URL=http://backend:8001
      - NEXT_PUBLIC_BACKEND_URL=https://agenticstack.store
    env_file:
      - .env
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env
    depends_on:
      - frontend
      - backend

volumes:
  db-data:
  chroma-data:
  charts-data:
  caddy_data:
  caddy_config:
